name: Deploy Illust App to GitHub Pages

on:
  push:
    branches:
      - claude/character-illustration-app-rt5J9
      - main
    paths:
      - 'apps/illust/**'
      - '.github/workflows/deploy-illust.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/illust/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install
        working-directory: apps/illust

      - name: Build
        run: pnpm build
        working-directory: apps/illust
        env:
          VITE_BASE: /my-project/illust/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/illust/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
